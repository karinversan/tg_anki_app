name: ${STACK_NAME:-tg_anki}

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tg_anki}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    platform: linux/amd64
    expose:
      - "3310"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    env_file: ./.env
    depends_on:
      - postgres
      - redis
      - clamav
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
    command:
      [
        "sh",
        "-c",
        "alembic -c /app/infra/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file: ./.env
    depends_on:
      - postgres
      - redis
      - clamav
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: infra/Dockerfile.bot
    env_file: ./.env
    depends_on:
      - api
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    env_file: ./.env
    depends_on:
      - api
    expose:
      - "4173"
    restart: unless-stopped

volumes:
  pg_data:
  app_data:
